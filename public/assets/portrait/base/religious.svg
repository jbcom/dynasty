<svg viewBox="0 0 72 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="religious line — a robed, mitred figure">
  <!-- RELIGIOUS: a robed, mitred figure bust — the faith power base. -->
  <g fill="#c9a24a" stroke="#1a140c" stroke-width="2" stroke-linejoin="round">
    <!-- robed shoulders, broader + draped -->
    <path d="M8 96 C8 76 20 68 36 68 C52 68 64 76 64 96 Z"/>
    <!-- stole down the front -->
    <path d="M33 68 L33 96 M39 68 L39 96" fill="none" stroke-width="2.5"/>
    <circle cx="36" cy="50" r="14"/>
    <!-- mitre -->
    <path d="M26 38 C26 24 32 14 36 14 C40 14 46 24 46 38 Z"/>
  </g>
  <!-- a small cross on the mitre -->
  <path d="M36 22 L36 30 M32 26 L40 26" stroke="#1a140c" stroke-width="2" stroke-linecap="round"/>
</svg>
