    <path d="M10 96 C10 78 22 70 36 70 C50 70 62 78 62 96 Z"/>
    <!-- bow-tie collar -->
    <path d="M30 72 L36 76 L42 72 L40 80 L32 80 Z"/>
    <circle cx="36" cy="50" r="15"/>
    <!-- swept stage hair -->
    <path d="M21 46 C22 32 30 28 36 28 C42 28 51 33 51 46 C47 38 26 39 21 46 Z"/>
  </g>
  <!-- a fame star -->
  <path d="M52 26 l2.4 5 l5.4 .6 l-4 3.7 l1.1 5.3 l-4.9 -2.7 l-4.9 2.7 l1.1 -5.3 l-4 -3.7 l5.4 -.6 Z"
        fill="#f0d27a" stroke="#1a140c" stroke-width="1.5"/>
</svg>
