<svg viewBox="0 0 72 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="technological line — an inventor with a gear">
  <!-- TECHNOLOGICAL: an inventor bust with goggles + a gear — the invention power base. -->
  <g fill="#c9a24a" stroke="#1a140c" stroke-width="2" stroke-linejoin="round">
    <path d="M10 96 C10 78 22 70 36 70 C50 70 62 78 62 96 Z"/>
    <circle cx="36" cy="50" r="15"/>
    <!-- goggles pushed up on the brow -->
    <circle cx="29" cy="40" r="4.5"/>
    <circle cx="43" cy="40" r="4.5"/>
    <path d="M33 40 L39 40" stroke-width="2.5"/>
  </g>
  <!-- a cog emblem at the shoulder -->
  <g fill="#f0d27a" stroke="#1a140c" stroke-width="1.5">
    <path d="M46 82 l2 -4 l4 2 l-1 4 l4 1 l-2 4 l-4 -1 l-2 4 l-4 -2 l1 -4 l-4 -1 l2 -4 l4 1 Z"/>
    <circle cx="48" cy="84" r="2.5" fill="#c9a24a"/>
  </g>
</svg>
