<svg viewBox="0 0 72 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="economic line — a magnate in a top hat">
  <!-- ECONOMIC: a top-hatted magnate bust — the gilded-age money power base. -->
  <g fill="#c9a24a" stroke="#1a140c" stroke-width="2" stroke-linejoin="round">
    <!-- shoulders -->
    <path d="M8 96 C8 78 22 70 36 70 C50 70 64 78 64 96 Z"/>
    <!-- head -->
    <circle cx="36" cy="50" r="16"/>
    <!-- top hat -->
    <path d="M20 36 L20 22 C20 18 24 16 36 16 C48 16 52 18 52 22 L52 36 Z"/>
    <rect x="14" y="34" width="44" height="5" rx="2"/>
  </g>
  <!-- a coin glint on the lapel -->
  <circle cx="44" cy="80" r="4" fill="#f0d27a" stroke="#1a140c" stroke-width="1.5"/>
</svg>
