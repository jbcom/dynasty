name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser-mode tests (Vitest + Playwright)
        # Force the COLD .vite cache that exposed the dep-optimizer reload flake (a runtime-only bare
        # dep discovered mid-run → full-page reload → "Vitest failed to find the runner"). The fix is
        # optimizeDeps.include in vitest.config.ts; this rm makes the cold-cache invariant permanent so
        # any future runtime-only dep missing from that list fails CI loudly instead of flaking.
        run: |
          rm -rf node_modules/.vite
          pnpm test:browser

      - name: Build
        run: pnpm build

      - name: End-to-end playthroughs
        run: pnpm test:e2e
